# Gitee Go / 流水线 — adjust image names to match your Gitee runner labels.
# Secrets: NPM_TOKEN (npmjs publish), optional OPENCV for native-opencv job.

stages:
  - test
  - native
  - release

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

rust-test:
  stage: test
  image: rust:1-bookworm
  script:
    - cargo test --workspace

ts-test:
  stage: test
  image: node:20-bookworm
  script:
    - npm ci
    - npm run build -w @spotter/base
    - npm run build -w @spotter/core
    - npm run build -w @spotter/plugin-ocr
    - npm test --workspace=@spotter/base --workspace=@spotter/core

native-win:
  stage: native
  tags:
    - windows
  script:
    - npm ci
    - npm run build -w @spotter-rs/node
    - npx napi prepublish -p crates/spotter-node --skip-gh-release
  artifacts:
    paths:
      - crates/spotter-node/

native-linux:
  stage: native
  image: node:20-bookworm
  script:
    - apt-get update && apt-get install -y build-essential
    - npm ci
    - npm run build -w @spotter-rs/node
    - npx napi prepublish -p crates/spotter-node --skip-gh-release
  artifacts:
    paths:
      - crates/spotter-node/

native-opencv:
  stage: native
  when: manual
  tags:
    - windows
  script:
    - npm ci
    - npm run build -w @spotter-rs/node-match-opencv
    - npx napi prepublish -p crates/spotter-node-match-opencv --skip-gh-release

npm-release:
  stage: release
  image: node:20-bookworm
  only:
    - tags
  script:
    - npm ci
    - npm run sync-license
    - npm run release
  environment:
    name: npm

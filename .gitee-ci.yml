# Gitee Go / 流水线 — adjust image names to match your Gitee runner labels.
# Secrets: NPM_TOKEN (npmjs publish)

stages:
  - test
  - native
  - release

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

rust-test:
  stage: test
  image: rust:1-bookworm
  script:
    - cargo test --workspace

ts-test:
  stage: test
  image: node:20-bookworm
  script:
    - npm ci
    - npm run build -w @spotterjs/base
    - npm run build -w @spotterjs/core
    - npm run build -w @spotterjs/plugin-ocr
    - npm test --workspace=@spotterjs/base --workspace=@spotterjs/core

native-win:
  stage: native
  tags:
    - windows
  script:
    - npm ci
    - npm run build -w @spotterjs/node
    - node scripts/prepare-native-package.mjs win32-x64-msvc
  artifacts:
    paths:
      - crates/spotterjs-node/win32-x64-msvc/

native-linux:
  stage: native
  image: node:20-bookworm
  script:
    - apt-get update && apt-get install -y build-essential
    - npm ci
    - npm run build:linux -w @spotterjs/node
    - node scripts/prepare-native-package.mjs linux-x64-gnu
  artifacts:
    paths:
      - crates/spotterjs-node/linux-x64-gnu/

npm-release:
  stage: release
  image: node:20-bookworm
  only:
    - tags
  script:
    - npm ci
    - npm run sync-license
    - npm run release
  environment:
    name: npm

[package]
edition = "2018"
name = "bitarray"
version = "0.2.6"
authors = ["Geordon Worley <vadixidav@gmail.com>", "spotterjs Contributors"]
description = "A const generics driven bit array, patched for stable Rust"
documentation = "https://docs.rs/bitarray/"
readme = "README.md"
keywords = ["const", "generics", "bit", "array", "hamming"]
categories = ["no-std"]
license = "MIT"
repository = "https://github.com/rust-cv/bitarray"

[dependencies.space]
version = "0.10.3"
optional = true

[features]
serde = []
space = ["dep:space"]
unstable-512-bit-simd = []
